<!doctype html>
<html lang="en">

<head>
    <title>Earthboy and Airgirl</title>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="main.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Metamorphous&display=swap" rel="stylesheet">
</head>

<body>
    <h1 id="game_title" class="gold-text">Earthboy: Journey through the Caves</h1>
    
    <div id="start_menu">
        <div id="button_container">
            <button id="start_button">
                <span class="gold-text">Start Game!</span>
            </button>
            
            <button id="profile">
                <span class="gold-text">Profile</span>
            </button>
            
            <button id="shop">
                <span class="gold-text">Shop</span>
            </button>
            
            <button id="settings">
                <span class="gold-text">Settings</span>
            </button>
            
            <button id="login_button">
                <span class="gold-text">Login</span>
            </button>
            
            <button id="logout_button">
                <span class="gold-text">Log out</span>
            </button>
        </div>
    </div>

    <div id="door"></div>
    <div id="player"></div>

    <div id="victory_screen">
        <div id="victory_content">
            <h1>Victory!</h1>
            <div id="victory_buttons">
                <button id="next_level_button">Next Level</button>
                <button id="main_menu_button">Main Menu</button>
            </div>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
