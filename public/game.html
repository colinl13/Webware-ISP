<!doctype html>
<html lang="en">

<head>
    <title>Earthboy: Journey through the Cave - Game</title>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="main.css">
</head>

<body class="game-playing">
    <div id="bg-layer"></div>
    <div id="door"></div>
    <div id="player"></div>

    <button id="pause_button">Pause</button>

    <div id="pause_screen">
        <div id="pause_content">
            <h1 class="gold-text">Pause</h1>
            <div id="pause_buttons">
                <button id="restart_button2">
                    <span class="gold-text"> Restart Level</span>
                </button>
                <button id="level_select_button2">
                    <span class="gold-text">Level Select</span>
                </button>
                <button id="main_menu_button2">
                    <span class="gold-text">Main Menu</span>
                </button>
            </div>
        </div>
    </div>

    <div id="victory_screen">
        <div id="victory_content">
            <h1 class="gold-text">Victory!</h1>
            <div id="victory_buttons">
                <button id="next_level_button">
                    <span class="gold-text">Next Level</span>
                </button>
                <button id="level_select_button">
                    <span class="gold-text">Level Select</span>
                </button>
                <button id="main_menu_button">
                    <span class="gold-text">Main Menu</span>
                </button>
            </div>
        </div>
    </div>
</body>

<script src="game.js"></script>
</html>
